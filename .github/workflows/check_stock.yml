name: 🔍 Check RunPod Stock
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Check Stock
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          python3 -c "
          import requests, os, json
          API_KEY = os.environ.get('RUNPOD_API_KEY')
          headers = {'Authorization': f'Bearer {API_KEY}', 'Content-Type': 'application/json'}
          query = '{ gpuTypes { id displayName secureCloud communityCloud } }'
          r = requests.post('https://api.runpod.io/graphql?api_key=' + API_KEY, json={'query': query}, headers=headers)
          print(f'Status: {r.status_code}')
          data = r.json()
          if 'data' in data and data['data']:
              for g in data['data']['gpuTypes']:
                  name = g.get('displayName', 'Unknown')
                  if 'H100' in name or 'A100' in name:
                      print(f\"ID: {g['id']}, Name: {name}, Secure: {g.get('secureCloud')}, Community: {g.get('communityCloud')}\")
          else:
              print(f'Full Response: {json.dumps(data, indent=2)}')
          "
