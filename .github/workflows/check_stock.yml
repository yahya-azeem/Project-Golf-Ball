name: 🔍 Check RunPod Stock
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Check Stock
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          python3 -c "
          import requests, os, json
          API_KEY = os.environ.get('RUNPOD_API_KEY')
          headers = {'Authorization': f'Bearer {API_KEY}'}
          r = requests.get('https://rest.runpod.io/v1/gpu-types', headers=headers)
          data = r.json()
          # If data is a dict instead of list, check for a 'gpus' or similar key
          gpus = data if isinstance(data, list) else data.get('gpus', [])
          if not gpus and isinstance(data, dict):
              print(f'Full Response: {json.dumps(data, indent=2)}')
          for g in gpus:
              name = g.get('name', 'Unknown')
              id = g.get('id', 'Unknown')
              if 'H100' in name or 'A100' in name:
                  print(f\"ID: {id}, Name: {name}, Secure: {g.get('secureStock', 0)}, Community: {g.get('communityStock', 0)}\")
          "
