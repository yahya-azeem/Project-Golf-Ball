name: Unified Train (RunPod)

on:
  workflow_dispatch:
    inputs:
      gpu_count:
        description: 'GPUs to use (1 for test, 8 for full training)'
        required: true
        default: '1'
      gpu_type:
        description: 'GPU Type ID (e.g. "NVIDIA H100 80GB HBM3")'
        required: false
        default: 'NVIDIA H100 80GB HBM3'
      template_id:
        description: 'Template Name or ID'
        required: false
        default: 'Project Golf (H100 Optimized)'
      cloud_type:
        description: 'Cloud Type (SECURE or COMMUNITY)'
        required: false
        default: 'SECURE'
      skip_cpu_test:
        description: 'Skip CPU Validation?'
        type: boolean
        required: false
        default: false

jobs:
  validate_and_train:
    name: 🚀 Validate & Train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests numpy torch sentencepiece

      - name: 🛡️ Script Verification
        run: |
          echo "🔍 Verifying Python scripts syntax..."
          python3 -m py_compile runpod/manage_pod.py runpod/run_challenge.py

      - name: 🛡️ CPU Validation
        if: github.event.inputs.skip_cpu_test != 'true'
        run: |
          PYTHONPATH=. python3 runpod/cpu_test.py

      - name: 🛰️ Resume or Deploy RunPod
        id: manage
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          SECRET_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          SECRET_VOLUME_ID: ${{ secrets.RUNPOD_NETWORK_VOLUME_ID }}
          RUNPOD_CLOUD_TYPE: ${{ github.event.inputs.cloud_type || 'SECURE' }}
        run: |
          # 1. Determine Pod ID (Secret or Discovery)
          POD_ID="$SECRET_POD_ID"
          if [ -z "$POD_ID" ] || [ "$POD_ID" == "null" ]; then
            DIS_POD=$(python3 runpod/manage_pod.py --find-pod --gpu_count ${{ github.event.inputs.gpu_count }} --json || echo '{"error": "not found"}')
            if echo "$DIS_POD" | jq -e '.id' >/dev/null 2>&1; then
              POD_ID=$(echo "$DIS_POD" | jq -r .id)
            fi
          fi

          # 2. Resume or Deploy
          NEEDS_WAIT=false
          if [ ! -z "$POD_ID" ] && [ "$POD_ID" != "null" ]; then
            echo "🔄 Resuming existing pod $POD_ID..."
            python3 runpod/manage_pod.py --resume "$POD_ID" --gpu_count ${{ github.event.inputs.gpu_count }} --json > pod_info.json
          else
            echo "🆕 Deploying new pod using 'Project Golf (H100 Optimized)' template..."
            [ ! -z "$SECRET_VOLUME_ID" ] && VOL_ARG="--network_volume_id $SECRET_VOLUME_ID" || VOL_ARG=""
            PUB_KEY=$(cat runpod/ssh_key.pub)
            # Use name 'Project Golf (H100 Optimized)' - script will resolve ID automatically
            python3 runpod/run_challenge.py \
              --json \
              --count ${{ github.event.inputs.gpu_count }} \
              --gpu_type "${{ github.event.inputs.gpu_type || 'NVIDIA H100 80GB HBM3' }}" \
              --template "${{ github.event.inputs.template_id || 'Project Golf (H100 Optimized)' }}" \
              --ssh_public_key "$PUB_KEY" $VOL_ARG > pod_info.json
            NEEDS_WAIT=true
          fi

          cat pod_info.json
          POD_ID=$(jq -r .pod_id pod_info.json)

          # 3. For fresh deploys, wait for full SSH readiness (API + socket)
          if [ "$NEEDS_WAIT" = "true" ]; then
            echo "🔄 Fresh deploy detected — waiting for SSH readiness (up to 10 mins)..."
            python3 runpod/manage_pod.py --wait "$POD_ID" --json > pod_info.json
            cat pod_info.json
          fi

          echo "pod_id=$(jq -r .pod_id pod_info.json)" >> $GITHUB_OUTPUT
          echo "ip=$(jq -r .ip pod_info.json)" >> $GITHUB_OUTPUT
          echo "port=$(jq -r .port pod_info.json)" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Retry ssh-keyscan with aggressive backoff (total ~2 mins)
          IP="${{ steps.manage.outputs.ip }}"
          PORT="${{ steps.manage.outputs.port }}"
          echo "🔍 Scanning host keys for $IP:$PORT"
          
          for i in {1..12}; do
            echo "ssh-keyscan attempt $i..."
            ssh-keyscan -p $PORT $IP >> ~/.ssh/known_hosts 2>/dev/null && [ -s ~/.ssh/known_hosts ] && break
            echo "ssh-keyscan failed or empty, retrying in 10s..."
            sleep 10
          done

          # Fallback: disable strict host key checking if keyscan still failed
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "⚠️ ssh-keyscan failed after 12 retries, disabling StrictHostKeyChecking"
            echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" >> ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi

      - name: 🏋️ Training on Pod
        run: |
          IP="${{ steps.manage.outputs.ip }}"
          PORT="${{ steps.manage.outputs.port }}"
          echo "🚀 Training starting on $IP:$PORT"
          
          # Use ssh -tt for pseudo-terminal to ensure real-time streaming logs
          ssh -tt -i ~/.ssh/id_ed25519 root@$IP -p $PORT "bash -c '
            cd /workspace/Project-Golf-Ball &&
            git pull origin main &&
            PYTHONUNBUFFERED=1 ./train_all.sh ${{ github.event.inputs.gpu_count }}
          '"
          
          echo "✅ Training session completed."

      - name: 🤖 Submit PR with Results
        if: always()
        env:
          GH_PAT_SUBMISSION: ${{ secrets.GH_PAT_SUBMISSION }}
        run: |
          IP="${{ steps.manage.outputs.ip }}"
          PORT="${{ steps.manage.outputs.port }}"
          if [ -z "$IP" ] || [ "$PORT" == "null" ]; then
            echo "⚠️ No pod IP/Port found. Skipping result sync."
            exit 0
          fi
          
          echo "📦 Syncing results from pod..."
          # Fix: Use -o before -P and ensure IP/PORT are sanitized
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -P "$PORT" root@"$IP":/workspace/Project-Golf-Ball/results_summary.json . || echo "0.0 0.0 0.0" > results_summary.json
          
          echo "📝 Generating PR description..."
          python3 runpod/generate_pr_description.py "results_summary.json" > pr_body.txt
          
          # Automated result submission logic
          git checkout -b results/run-${{ github.run_id }}
          git add results_summary.json
          git commit -m "Submit results for run ${{ github.run_id }}" || echo "No results to commit"
          git push origin results/run-${{ github.run_id }}
          
          echo "🛰️ Creating Pull Request..."
          gh pr create --title "Run Results #${{ github.run_id }}" --body-file pr_body.txt --base main --head results/run-${{ github.run_id }}

      - name: 🧹 Cleanup RunPod
        if: always()
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          POD_ID="${{ steps.manage.outputs.pod_id }}"
          if [ ! -z "$POD_ID" ] && [ "$POD_ID" != "null" ]; then
            echo "🛑 Terminating pod $POD_ID to prevent cost leakage..."
            python3 runpod/run_challenge.py --terminate "$POD_ID"
          else
            echo "ℹ️ No pod to terminate (provisioning failed early or no pod requested)."
          fi
