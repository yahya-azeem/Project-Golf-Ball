name: Unified Train (RunPod)

on:
  workflow_dispatch:
    inputs:
      gpu_count:
        description: 'GPUs to use (1 for test, 8 for full training)'
        required: true
        default: '1'
      skip_cpu_test:
        description: 'Skip CPU Validation?'
        type: boolean
        required: false
        default: false

jobs:
  validate_and_train:
    name: 🚀 Validate & Train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests numpy torch sentencepiece

      - name: 🛡️ CPU Validation
        if: github.event.inputs.skip_cpu_test != 'true'
        run: |
          PYTHONPATH=. python runpod/cpu_test.py

      - name: 🛰️ Resume or Deploy RunPod
        id: manage
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          SECRET_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          SECRET_VOLUME_ID: ${{ secrets.RUNPOD_NETWORK_VOLUME_ID }}
        run: |
          # 1. Determine Pod ID
          POD_ID="$SECRET_POD_ID"
          if [ -z "$POD_ID" ] || [ "$POD_ID" == "null" ]; then
            DIS_POD=$(python runpod/manage_pod.py --find-pod --gpu_count ${{ github.event.inputs.gpu_count }} --json || echo '{"error": "not found"}')
            if echo "$DIS_POD" | jq -e '.id' >/dev/null 2>&1; then
              POD_ID=$(echo "$DIS_POD" | jq -r .id)
            fi
          fi

          # 2. Resume or Deploy
          NEEDS_WAIT=false
          if [ ! -z "$POD_ID" ] && [ "$POD_ID" != "null" ]; then
            # Resume existing pod — manage_pod.py --resume already waits for SSH
            python runpod/manage_pod.py --resume "$POD_ID" --gpu_count ${{ github.event.inputs.gpu_count }} --json > pod_info.json
          else
            # Fresh deploy — run_challenge.py only returns pod_id, NOT ip/port
            [ ! -z "$SECRET_VOLUME_ID" ] && VOL_ARG="--network_volume_id $SECRET_VOLUME_ID" || VOL_ARG=""
            PUB_KEY=$(cat runpod/ssh_key.pub)
            python runpod/run_challenge.py --json --count ${{ github.event.inputs.gpu_count }} --template t7iu9ugzpi --ssh_public_key "$PUB_KEY" $VOL_ARG > pod_info.json
            NEEDS_WAIT=true
          fi

          cat pod_info.json
          POD_ID=$(jq -r .pod_id pod_info.json)

          # 3. For fresh deploys, wait for full SSH readiness (API + socket)
          if [ "$NEEDS_WAIT" = "true" ]; then
            echo "🔄 Fresh deploy detected — waiting for SSH readiness..."
            python runpod/manage_pod.py --wait "$POD_ID" --json > pod_info.json
            cat pod_info.json
          fi

          echo "pod_id=$(jq -r .pod_id pod_info.json)" >> $GITHUB_OUTPUT
          echo "ip=$(jq -r .ip pod_info.json)" >> $GITHUB_OUTPUT
          echo "port=$(jq -r .port pod_info.json)" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Retry ssh-keyscan up to 5 times (SSH may still be initializing host keys)
          for i in 1 2 3 4 5; do
            echo "ssh-keyscan attempt $i..."
            ssh-keyscan -p ${{ steps.manage.outputs.port }} ${{ steps.manage.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan failed, retrying in 10s..."
            sleep 10
          done

          # Fallback: disable strict host key checking if keyscan still failed
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "⚠️ ssh-keyscan failed after retries, disabling StrictHostKeyChecking"
            echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" >> ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi

      - name: 🏋️ Training on Pod (Conditional 3-Seed)
        run: |
          # Use -tt for real-time streaming to GHA console
          ssh -tt -i ~/.ssh/id_ed25519 root@${{ steps.manage.outputs.ip }} -p ${{ steps.manage.outputs.port }} "bash -c '
            set -e
            export PYTHONUNBUFFERED=1
            mkdir -p /workspace/parameter-golf && cd /workspace/parameter-golf
            [ ! -d \"project_golf_ball\" ] && git clone -b main https://github.com/${{ github.repository }}.git project_golf_ball || (cd project_golf_ball && git fetch origin && git reset --hard origin/main)
            
            SOTA=\$(python3 project_golf_ball/runpod/get_sota.py)
            echo \"Current SOTA: \$SOTA\"
            
            [ ! -d \"openai-golf\" ] && git clone https://github.com/openai/parameter-golf.git openai-golf || true
            cp project_golf_ball/train_gpt.py openai-golf/train_gpt.py && cd openai-golf
            python3 data/cached_challenge_fineweb.py --variant sp1024
            
            FINAL_RESULTS=\"\"
            for SEED in 0 1 2; do
              echo \"🚀 Starting Seed: \$SEED\"
              export SEED=\$SEED
              torchrun --standalone --nproc_per_node=${{ github.event.inputs.gpu_count }} train_gpt.py 2>&1 | tee train_seed_\$SEED.log
              
              BPB=\$(grep \"Final TTT BPB:\" train_seed_\$SEED.log | tail -1 | awk \"{print \\\$NF}\" || echo \"\")
              if [ -z \"\$BPB\" ]; then
                echo \"❌ Seed \$SEED failed. Check logs above.\"
                break
              fi
              
              echo \"Seed \$SEED BPB: \$BPB\"
              FINAL_RESULTS=\"\$FINAL_RESULTS \$BPB\"
              
              if [ \"\$SEED\" == \"0\" ]; then
                WORTHY=\$(python3 -c \"print(float('\$BPB') < (float('\$SOTA') + 0.015))\")
                if [ \"\$WORTHY\" != \"True\" ]; then
                  echo \"⚠️ Seed 0 (\$BPB) not worthy. Aborting.\"
                  break
                fi
              fi
            done
            echo \"\$FINAL_RESULTS\" > /workspace/parameter-golf/results.summary
          '"

      - name: Create Summary
        run: |
          RESULTS=$(ssh -i ~/.ssh/id_ed25519 root@${{ steps.manage.outputs.ip }} -p ${{ steps.manage.outputs.port }} "cat /workspace/parameter-golf/results.summary")
          echo "### Challenge Results 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Seeds: $RESULTS" >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Submit PR
        if: always() && steps.manage.outputs.pod_id != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SUBMISSION }}
        run: |
          scp -i ~/.ssh/id_ed25519 -P ${{ steps.manage.outputs.port }} -o StrictHostKeyChecking=no root@${{ steps.manage.outputs.ip }}:/workspace/parameter-golf/results.summary ./results.summary || echo "" > results.summary
          RESULTS=$(cat results.summary)
          python3 runpod/generate_pr_description.py "$RESULTS"
          BRANCH_NAME="results/run-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "$RESULTS" > last_results.txt
          git config user.name "Project Golf CI/CD"
          git config user.email "ci-cd@project-golf.ball"
          git add last_results.txt
          git commit -m "Results for run ${{ github.run_id }}: $RESULTS"
          git push origin "$BRANCH_NAME"
          gh pr create --title "$(cat pr_title.txt)" --body-file pr_body.md --head "$BRANCH_NAME" --base main --draft=false

      - name: 💤 Cleanup
        if: always()
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          POD_ID="${{ steps.manage.outputs.pod_id }}"
          python runpod/run_challenge.py --terminate "$POD_ID" || true
